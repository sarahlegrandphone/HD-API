<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jouw Human Design Chart</title>

  <style>
    body {
      background: #f6f2ec; /* zachte beige */
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #333;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #63bca1; /* jouw turquoise */
      font-weight: 600;
      margin-bottom: 30px;
    }

    .form-box {
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: #63bca1;
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4ea48b;
    }

    #result {
      margin-top: 40px;
      padding: 20px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: none;
    }
  </style>
</head>

<body>

  <h1>Bereken jouw Human Design</h1>

  <div class="form-box">
    <label>Geboortedatum</label>
    <input type="date" id="date" />

    <label>Geboortetijd</label>
    <input type="time" id="time" />

    <label>Geboorteplaats</label>
    <input type="text" id="place" placeholder="bv. Kortemark" />

    <button onclick="calculate()">Bereken mijn chart</button>
  </div>

  <div id="result"></div>
  <div id="bodygraph" style="margin-top: 30px; display: none;">
  <h2>Jouw Bodygraph</h2>
  <img id="bodygraphImage" style="width: 100%; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.08);" />
</div>


  <script>
  <script>
  async function calculate() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const place = document.getElementById("place").value;

    if (!date || !time || !place) {
      alert("Vul alle velden in.");
      return;
    }

    // 1. JSON ophalen
    const res = await fetch(`/api/calculate?date=${date}&time=${time}&place=${place}`);
    const data = await res.json();

    const box = document.getElementById("result");
    box.style.display = "block";
    box.innerHTML = `
      <h2>Jouw chart</h2>
      <pre>${JSON.stringify(data, null, 2)}</pre>
    `;

    // 2. Bodygraph-afbeelding ophalen
    const imgRes = await fetch(`/api/generate-image`);
    const blob = await imgRes.blob();
    const imgUrl = URL.createObjectURL(blob);

    // 3. Afbeelding tonen
    const imgBox = document.getElementById("bodygraph");
    const img = document.getElementById("bodygraphImage");

    img.src = imgUrl;
    imgBox.style.display = "block";
  }
</script>

  </script>

</body>
</html>
